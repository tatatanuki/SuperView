<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>景色のいい場所マップ</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  :root {
    --paper: #FBF8F2;
    --paper-alt: #F3EEE1;
    --ink: #23301F;
    --ink-soft: #5B6A55;
    --pine: #28422E;
    --pine-deep: #1B2E20;
    --sky: #4E7A8C;
    --gold: #E3A542;
    --gold-deep: #C8862A;
    --line: #DBD3BE;
    --card-shadow: 0 1px 2px rgba(35, 48, 31, 0.06);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'Inter', "Hiragino Sans", "Yu Gothic", "Meiryo", sans-serif;
    background: var(--paper);
    color: var(--ink);
  }
  .mono { font-family: 'JetBrains Mono', monospace; }

  header {
    background: var(--pine);
    color: var(--paper);
    padding: 22px 28px 20px;
    position: relative;
    overflow: hidden;
    border-bottom: 3px solid var(--gold);
  }
  header svg.contours {
    position: absolute;
    top: 0; right: 0;
    height: 100%;
    width: 260px;
    opacity: 0.16;
    pointer-events: none;
  }
  header .eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--gold);
    margin: 0 0 6px;
  }
  header h1 {
    margin: 0;
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 26px;
    letter-spacing: 0.01em;
  }
  header p {
    margin: 6px 0 0;
    font-size: 13px;
    color: #D9E4DA;
    max-width: 560px;
    line-height: 1.5;
  }

  .controls {
    display: flex;
    gap: 10px;
    padding: 14px 28px;
    background: var(--paper-alt);
    border-bottom: 1px solid var(--line);
    flex-wrap: wrap;
    align-items: center;
  }
  .controls input[type="text"] {
    flex: 1;
    min-width: 180px;
    padding: 10px 14px;
    border: 1px solid var(--line);
    border-radius: 999px;
    font-size: 14px;
    font-family: 'Inter', sans-serif;
    background: var(--paper);
    color: var(--ink);
  }
  .controls input[type="text"]:focus,
  .controls select:focus,
  .controls button:focus {
    outline: 2px solid var(--sky);
    outline-offset: 1px;
  }
  .controls select, .controls button {
    padding: 9px 16px;
    border-radius: 999px;
    border: 1px solid var(--line);
    font-size: 13px;
    font-family: 'Inter', sans-serif;
    background: var(--paper);
    color: var(--ink);
    cursor: pointer;
    white-space: nowrap;
  }
  .controls select { font-family: 'JetBrains Mono', monospace; font-size: 12px; }
  .controls button:hover { border-color: var(--sky); color: var(--sky); }
  .controls button.primary {
    background: var(--gold);
    color: var(--pine-deep);
    border: none;
    font-weight: 600;
  }
  .controls button.primary:hover { background: var(--gold-deep); color: white; }

  .layout {
    display: flex;
    height: calc(100vh - 132px);
  }
  #map { flex: 1; filter: saturate(0.92); }

  #sidebar {
    width: 340px;
    background: var(--paper);
    border-left: 1px solid var(--line);
    overflow-y: auto;
    padding: 14px;
    display: flex;
    flex-direction: column;
  }

  .tabs { display: flex; gap: 6px; margin-bottom: 12px; border-bottom: 1px solid var(--line); }
  .tabs button {
    flex: 1;
    padding: 9px 8px;
    border: none;
    background: transparent;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 500;
    color: var(--ink-soft);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
  }
  .tabs button.active { color: var(--pine); border-bottom-color: var(--gold); font-weight: 600; }

  .status {
    font-size: 12.5px;
    color: var(--ink-soft);
    padding: 6px 2px 12px;
    line-height: 1.5;
    font-family: 'JetBrains Mono', monospace;
  }
  .status.error { color: #B4472F; }

  .spot-card {
    position: relative;
    padding: 12px 14px;
    border: 1px solid var(--line);
    border-radius: 10px;
    margin-bottom: 10px;
    cursor: pointer;
    background: white;
    box-shadow: var(--card-shadow);
    transition: border-color 0.15s, transform 0.1s;
  }
  .spot-card:hover { border-color: var(--sky); transform: translateX(2px); }
  .spot-card .name {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 15px;
    color: var(--pine-deep);
    padding-right: 40px;
  }
  .spot-card .desc { font-size: 12px; color: var(--ink-soft); margin-top: 5px; line-height: 1.5; }
  .spot-card .meta { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
  .spot-card .category {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10.5px;
    background: var(--paper-alt);
    color: var(--pine);
    padding: 3px 8px;
    border-radius: 999px;
    border: 1px solid var(--line);
  }
  .spot-card .weather { font-size: 12px; color: var(--ink-soft); }
  .spot-card.sunny { border-color: var(--gold); background: #FFFBF0; }

  .sunny-badge {
    position: absolute;
    top: -8px;
    right: 10px;
    width: 46px;
    height: 46px;
    border-radius: 50%;
    background: var(--gold);
    color: var(--pine-deep);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    font-size: 15px;
    box-shadow: 0 2px 4px rgba(200, 134, 42, 0.4);
    transform: rotate(8deg);
    border: 2px solid var(--paper);
  }
  .sunny-badge span { font-family: 'JetBrains Mono', monospace; font-size: 7px; font-weight: 600; letter-spacing: 0.02em; }

  .fav-btn {
    position: absolute;
    top: 10px;
    right: 12px;
    border: none;
    background: none;
    font-size: 18px;
    cursor: pointer;
    color: #C9C2AE;
    padding: 2px 4px;
    line-height: 1;
  }
  .spot-card.sunny .fav-btn { top: 40px; }
  .fav-btn.active { color: var(--gold-deep); }
  .fav-btn:hover { color: var(--gold-deep); }
  .fav-btn:disabled { opacity: 0.5; cursor: default; }

  #favorite-panel { flex: 1; }
  .empty-note {
    font-size: 12.5px;
    color: var(--ink-soft);
    line-height: 1.6;
    padding: 20px 6px;
    text-align: center;
    border: 1px dashed var(--line);
    border-radius: 10px;
  }
</style>
</head>
<body>

<header>
  <svg class="contours" viewBox="0 0 260 200" xmlns="http://www.w3.org/2000/svg">
    <path d="M20,180 Q80,120 40,60 Q20,20 80,10" stroke="#FBF8F2" stroke-width="1" fill="none"/>
    <path d="M50,190 Q110,130 70,70 Q50,30 110,20" stroke="#FBF8F2" stroke-width="1" fill="none"/>
    <path d="M80,200 Q140,140 100,80 Q80,40 140,30" stroke="#FBF8F2" stroke-width="1" fill="none"/>
    <path d="M110,200 Q170,150 130,90 Q110,50 170,40" stroke="#FBF8F2" stroke-width="1" fill="none"/>
    <path d="M140,200 Q200,160 160,100 Q140,60 200,50" stroke="#FBF8F2" stroke-width="1" fill="none"/>
  </svg>
  <p class="eyebrow">FIELD GUIDE — VIEWPOINTS &amp; WEATHER</p>
  <h1>景色のいい場所マップ</h1>
  <p>OpenStreetMapのデータから観光スポットを検索し、Open-Meteoの天気情報で「今日晴れている場所」を優先表示します</p>
</header>

<div class="controls">
  <input type="text" id="search-input" placeholder="地名を入力(例: 富士山、京都、鎌倉)">
  <button id="search-btn">この場所へ移動</button>
  <button id="locate-btn">📍 現在地から探す</button>
  <select id="radius-select">
    <option value="1000">半径 1km</option>
    <option value="3000" selected>半径 3km</option>
    <option value="5000">半径 5km</option>
    <option value="10000">半径 10km</option>
  </select>
  <button id="find-btn" class="primary">この付近の観光スポットを探す</button>
</div>

<div class="layout">
  <div id="map"></div>
  <div id="sidebar">
    <div class="tabs">
      <button id="tab-search" class="active">検索結果</button>
      <button id="tab-favorites">お気に入り</button>
    </div>
    <div id="search-panel">
      <div id="status" class="status">地図を移動し「この付近の観光スポットを探す」を押してください</div>
      <div id="spot-list"></div>
    </div>
    <div id="favorite-panel" style="display:none;">
      <div id="favorite-status" class="status"></div>
      <div id="favorite-list"></div>
    </div>
  </div>
</div>

<script>
  const map = L.map('map').setView([35.6812, 139.7671], 12); // 初期表示: 東京駅付近

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors',
    maxZoom: 19,
  }).addTo(map);

  let markers = [];
  let userMarker = null;
  let favoriteIds = new Set(); // 現在お気に入り登録されているspot_idの集合(即時UI反映用)

  function clearMarkers() {
    markers.forEach(m => map.removeLayer(m));
    markers = [];
  }

  function setStatus(text, isError = false) {
    const el = document.getElementById('status');
    el.textContent = text;
    el.className = 'status' + (isError ? ' error' : '');
  }

  function weatherHtml(weather) {
    if (!weather) return '<span class="weather">天気情報なし</span>';
    const temp = (weather.temperature !== undefined && weather.temperature !== null)
      ? `${weather.temperature}℃` : '';
    return `<span class="weather">${weather.icon} ${weather.label} ${temp}</span>`;
  }

  function renderSpots(spots) {
    clearMarkers();
    const listEl = document.getElementById('spot-list');
    listEl.innerHTML = '';

    if (spots.length === 0) {
      setStatus('この範囲には登録された観光スポットが見つかりませんでした。範囲を広げるか場所を変えてみてください。');
      return;
    }

    const sunnyCount = spots.filter(s => s.weather && s.weather.is_sunny).length;
    setStatus(`${spots.length} 件見つかりました(うち本日晴れ: ${sunnyCount} 件、天気の良い順に表示しています)`);

    spots.forEach(spot => {
      const isSunny = !!(spot.weather && spot.weather.is_sunny);
      const marker = L.marker([spot.lat, spot.lon]).addTo(map);
      marker.bindPopup(`
        <b>${spot.name}</b><br>
        ${spot.category || ''}<br>
        ${weatherHtml(spot.weather)}<br>
        ${spot.description || ''}
      `);
      markers.push(marker);

      const isFav = favoriteIds.has(spot.id);
      const card = document.createElement('div');
      card.className = 'spot-card' + (isSunny ? ' sunny' : '');
      card.innerHTML = `
        ${isSunny ? '<div class="sunny-badge"><div>☀</div><span>SUNNY</span></div>' : ''}
        <button class="fav-btn${isFav ? ' active' : ''}" data-spot-id="${spot.id}" title="お気に入りに追加">${isFav ? '★' : '☆'}</button>
        <div class="name">${spot.name}</div>
        <div class="meta">
          <span class="category mono">${spot.category || '観光スポット'}</span>
          ${weatherHtml(spot.weather)}
        </div>
        <div class="desc">${spot.description || '説明情報はありません'}</div>
      `;
      card.addEventListener('click', (e) => {
        if (e.target.classList.contains('fav-btn')) return; // 星ボタンでは地図移動させない
        map.setView([spot.lat, spot.lon], 15);
        marker.openPopup();
      });
      card.querySelector('.fav-btn').addEventListener('click', (e) => {
        e.stopPropagation();
        toggleFavorite(spot, e.target);
      });
      listEl.appendChild(card);
    });
  }

  async function findViewpoints() {
    const center = map.getCenter();
    const radius = document.getElementById('radius-select').value;

    setStatus('景色スポットを検索中...');

    try {
      const res = await fetch(`/api/viewpoints?lat=${center.lat}&lng=${center.lng}&radius=${radius}`);
      const data = await res.json();

      if (!res.ok) {
        setStatus(data.error || '検索に失敗しました', true);
        return;
      }
      renderSpots(data.spots);
    } catch (err) {
      setStatus('サーバーに接続できませんでした。app.pyが起動しているか確認してください。', true);
    }
  }

  async function searchPlace() {
    const q = document.getElementById('search-input').value.trim();
    if (!q) return;

    setStatus('場所を検索中...');

    try {
      const res = await fetch(`/api/geocode?q=${encodeURIComponent(q)}`);
      const data = await res.json();

      if (!res.ok) {
        setStatus(data.error || '場所が見つかりませんでした', true);
        return;
      }
      map.setView([data.lat, data.lon], 13);
      setStatus(`「${data.display_name}」に移動しました。続けて景色スポットを検索できます。`);
    } catch (err) {
      setStatus('サーバーに接続できませんでした。app.pyが起動しているか確認してください。', true);
    }
  }

  function useCurrentLocation() {
    if (!navigator.geolocation) {
      setStatus('このブラウザは位置情報の取得に対応していません', true);
      return;
    }

    setStatus('現在地を取得中...');

    navigator.geolocation.getCurrentPosition(
      (pos) => {
        const { latitude, longitude } = pos.coords;
        map.setView([latitude, longitude], 14);

        if (userMarker) map.removeLayer(userMarker);
        userMarker = L.circleMarker([latitude, longitude], {
          radius: 8, color: '#4E7A8C', fillColor: '#4E7A8C', fillOpacity: 0.8,
        }).addTo(map).bindPopup('現在地');

        findViewpoints();
      },
      (err) => {
        // エラーコードごとに原因を切り分けて、利用者が次に何をすべきか分かるようにする
        let message;
        switch (err.code) {
          case err.PERMISSION_DENIED:
            message = '位置情報の利用が許可されていません。ブラウザの設定からこのサイトへの位置情報アクセスを許可してください。';
            break;
          case err.POSITION_UNAVAILABLE:
            message = '現在地を特定できませんでした。電波状況の良い場所で再度お試しください。';
            break;
          case err.TIMEOUT:
            message = '現在地の取得がタイムアウトしました。もう一度お試しいただくか、地名検索をご利用ください。';
            break;
          default:
            message = '現在地の取得に失敗しました(' + err.message + ')。';
        }
        setStatus(message + ' 代わりに地名検索もご利用いただけます。', true);
      },
      { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
    );
  }

  async function toggleFavorite(spot, btnEl) {
    const isFav = favoriteIds.has(spot.id);
    btnEl.disabled = true;
    try {
      if (isFav) {
        await fetch(`/api/favorites/${spot.id}`, { method: 'DELETE' });
        favoriteIds.delete(spot.id);
      } else {
        await fetch('/api/favorites', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            spot_id: spot.id, name: spot.name, lat: spot.lat, lon: spot.lon,
            category: spot.category, description: spot.description,
          }),
        });
        favoriteIds.add(spot.id);
      }
      btnEl.textContent = favoriteIds.has(spot.id) ? '★' : '☆';
      btnEl.classList.toggle('active', favoriteIds.has(spot.id));
    } catch (err) {
      setStatus('お気に入りの更新に失敗しました。サーバーに接続できているか確認してください。', true);
    } finally {
      btnEl.disabled = false;
    }
  }

  async function loadFavoriteIds() {
    try {
      const res = await fetch('/api/favorites');
      const data = await res.json();
      favoriteIds = new Set((data.favorites || []).map(f => f.spot_id));
    } catch (err) {
      favoriteIds = new Set();
    }
  }

  async function renderFavoritesPanel() {
    const statusEl = document.getElementById('favorite-status');
    const listEl = document.getElementById('favorite-list');
    statusEl.textContent = 'お気に入りを読み込み中...';
    listEl.innerHTML = '';

    try {
      const res = await fetch('/api/favorites');
      const data = await res.json();
      const favorites = data.favorites || [];
      favoriteIds = new Set(favorites.map(f => f.spot_id));

      if (favorites.length === 0) {
        statusEl.textContent = '';
        listEl.innerHTML = '<div class="empty-note">まだお気に入りはありません。<br>検索結果の☆をタップして登録できます。</div>';
        return;
      }
      statusEl.textContent = `${favorites.length} 件のお気に入り`;

      favorites.forEach(spot => {
        const card = document.createElement('div');
        card.className = 'spot-card';
        card.innerHTML = `
          <button class="fav-btn active" data-spot-id="${spot.spot_id}" title="お気に入りから削除">★</button>
          <div class="name">${spot.name}</div>
          <div class="meta">
            <span class="category mono">${spot.category || '観光スポット'}</span>
          </div>
          <div class="desc">${spot.description || '説明情報はありません'}</div>
        `;
        card.addEventListener('click', (e) => {
          if (e.target.classList.contains('fav-btn')) return;
          map.setView([spot.lat, spot.lon], 15);
        });
        card.querySelector('.fav-btn').addEventListener('click', async (e) => {
          e.stopPropagation();
          await fetch(`/api/favorites/${spot.spot_id}`, { method: 'DELETE' });
          renderFavoritesPanel();
        });
        listEl.appendChild(card);
      });
    } catch (err) {
      statusEl.textContent = 'お気に入りの取得に失敗しました。';
    }
  }

  function switchTab(tab) {
    const isSearch = tab === 'search';
    document.getElementById('tab-search').classList.toggle('active', isSearch);
    document.getElementById('tab-favorites').classList.toggle('active', !isSearch);
    document.getElementById('search-panel').style.display = isSearch ? 'block' : 'none';
    document.getElementById('favorite-panel').style.display = isSearch ? 'none' : 'block';
    if (!isSearch) renderFavoritesPanel();
  }

  document.getElementById('find-btn').addEventListener('click', findViewpoints);
  document.getElementById('search-btn').addEventListener('click', searchPlace);
  document.getElementById('locate-btn').addEventListener('click', useCurrentLocation);
  document.getElementById('search-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') searchPlace();
  });
  document.getElementById('tab-search').addEventListener('click', () => switchTab('search'));
  document.getElementById('tab-favorites').addEventListener('click', () => switchTab('favorites'));

  loadFavoriteIds();
</script>

</body>
</html>
